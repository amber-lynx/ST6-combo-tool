<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Kimberly Combo Tool</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Kimberly Combo Tool</h1>

<div class="panel">

Damage : <span id="damage">0</span>
Frame : <span id="frame">0</span>
Spray : <span id="spray">2</span>

</div>

<div id="combo" class="comboLine"></div>

<button onclick="clearCombo()">CLEAR</button>
<button onclick="saveCombo()">SAVE</button>

<div id="moves"></div>

<div id="followups"></div>

<h2>Saved Combos</h2>

<div id="saved"></div>

<script src="app.js"></script>

</body>
</html>
