<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimberly Combo Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">
<header>
    <h1>Kimberly Combo Tool</h1>
    <div class="header-controls">
        <div class="theme-select">
            <button onclick="setTheme('dark')">Dark</button>
            <button onclick="setTheme('blue')">Blue</button>
            <button onclick="setTheme('purple')">Purple</button>
            <button onclick="setTheme('green')">Green</button>
            <button onclick="setTheme('pink')">Pink</button>
            <button onclick="setTheme('orange')">Orange</button>
            <button onclick="setTheme('cyan')">Cyan</button>
        </div>
        <select onchange="location.href=this.value">
            <option value="index.html" selected>コンボ作成</option>
            <option value="edit.html">編集・削除</option>
        </select>
    </div>
</header>
<main class="container">
    <section class="combo-section">
        <div class="status-bar">
            <div id="cornerSwitcher" class="btn-toggle" onclick="toggleCorner()">場所: 中央</div>
            <div id="gaugeCount" class="gauge-badge">消費ゲージ: 0</div>
            <div id="damageCount" class="damage-badge">Damage: 0</div>
        </div>
        <div id="combo" class="combo-display"></div>
        <div class="main-controls">
            <button id="odSwitcher" class="btn-od-toggle" onclick="toggleOD()">ODモード: OFF</button>
            <button class="btn-undo" onclick="undo()">Undo</button>
            <button class="btn-clear" onclick="clearCombo()">Clear</button>
        </div>
        <div class="save-area">
            <input type="text" id="comboName" placeholder="コンボ名">
            <button class="btn-save" onclick="saveComboRoute()">保存</button>
        </div>
    </section>
    <section id="moves" class="moves-section"></section>
</main>
<script src="app.js"></script>
</body>
</html>
