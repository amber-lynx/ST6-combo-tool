<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Kimberly Combo Tool</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Kimberly Combo Tool</h1>

<div class="pageSelect">
    <label>ページ切替：
        <select id="pageSelector" onchange="switchPage()">
            <option value="index.html" selected>コンボ作成</option>
            <option value="edit.html">編集・削除</option>
        </select>
    </label>
</div>

<div class="panel">
    <input type="text" id="comboName" placeholder="ルート名（例：端攻め用）">
    <input type="text" id="comboCategory" placeholder="カテゴリ（例：中央戦用）">
    <button onclick="saveComboRoute()">登録</button>
    <button onclick="clearCombo()">CLEAR</button>
    <label><input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()"> ダークモード</label>
</div>

<div id="combo" class="comboLine" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
<div id="totalDamage">ダメージ合計: 0</div>
<div id="moves"></div>

<div class="category">
    <h3>派生</h3>
    <div id="followupsText">派生技なし</div>
</div>

<script src="app.js"></script>
<script>
function switchPage(){
    const sel = document.getElementById("pageSelector");
    window.location.href = sel.value;
}
function toggleDarkMode(){
    document.body.classList.toggle("dark");
}
</script>
</body>
</html>
