<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimberly Combo Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Kimberly Combo Tool</h1>
    
    <!-- ページ切替 -->
    <div class="pageSelect">
        <label>モード：
            <select id="pageSelector" onchange="location.href=this.value">
                <option value="index.html" selected>コンボ作成</option>
                <option value="edit.html">編集・削除</option>
            </select>
        </label>
    </div>
</header>

<main class="container">
    <!-- コンボ表示・操作エリア -->
    <section class="combo-section">
        <div id="combo" class="combo-display">
            <span class="placeholder">技を選択してコンボを作成...</span>
        </div>
        
        <div class="combo-controls">
            <button class="btn-undo" onclick="undo()">1手戻る</button>
            <button class="btn-clear" onclick="clearCombo()">全消去</button>
        </div>

        <div class="save-area">
            <input type="text" id="comboName" placeholder="コンボ名（例：画面端 投げ始動）">
            <button class="btn-save" onclick="saveComboRoute()">保存する</button>
        </div>
    </section>

    <!-- 技選択エリア -->
    <section id="moves" class="moves-section">
        <!-- ここにapp.jsからボタンが生成されます -->
        <p class="loading">読み込み中...</p>
    </section>
</main>

<script src="app.js"></script>

</body>
</html>
