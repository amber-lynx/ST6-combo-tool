<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ST6 Combo Tool</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>ST6 Combo Tool</h1>

<div class="panel">

<input id="comboName" placeholder="ルート名">
<input id="comboCategory" placeholder="カテゴリ">

<button onclick="saveCombo()">保存</button>
<button onclick="clearCombo()">CLEAR</button>

<label class="darkToggle">
<input type="checkbox" onchange="toggleDark()">
ダークモード
</label>

</div>

<div id="comboArea"></div>

<div id="damage">
合計ダメージ : <span id="damageValue">0</span>
</div>

<div id="moves"></div>

<div class="category">
<h3>派生</h3>
<div id="followups">派生技なし</div>
</div>

<script src="app.js"></script>

</body>
</html>
