<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kimberly Combo Tool</title>

<style>

body{
background:#0e1117;
color:white;
font-family:sans-serif;
padding:20px;
}

h1{
margin-bottom:10px;
}

.panel{
background:#161b22;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

button{
background:#21262d;
color:white;
border:none;
padding:10px 14px;
margin:4px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#30363d;
}

#combo{
font-size:22px;
margin:10px 0;
}

.category{
margin-top:20px;
}

.follow{
margin-top:10px;
}

.obs{
background:black;
font-size:32px;
padding:20px;
}

.mobile button{
padding:14px;
font-size:16px;
}

</style>

</head>

<body>

<h1>Kimberly Combo Tool</h1>

<div class="panel">

Damage : <span id="damage">0</span>  
Frame : <span id="frame">0</span>  
Spray : <span id="spray">2</span>

</div>

<div id="combo"></div>

<button onclick="clearCombo()">CLEAR</button>
<button onclick="saveCombo()">SAVE</button>
<button onclick="toggleOBS()">OBS MODE</button>

<div id="moves"></div>

<div id="followups" class="follow"></div>

<h2>Saved Combos</h2>

<div id="saved"></div>

<script>

let combo=[]
let damage=0
let frame=0
let spray=2

const moves={

standing:[
{name:"立LP",damage:300,frame:4},
{name:"立MP",damage:600,frame:6},
{name:"立HP",damage:900,frame:8},

{name:"立LK",damage:300,frame:4},
{name:"立MK",damage:700,frame:7},
{name:"立HK",damage:900,frame:9}
],

crouching:[
{name:"しゃがみLP",damage:300,frame:4},
{name:"しゃがみMP",damage:600,frame:6},
{name:"しゃがみHP",damage:900,frame:8},

{name:"しゃがみLK",damage:300,frame:4},
{name:"しゃがみMK",damage:700,frame:7},
{name:"しゃがみHK",damage:900,frame:9}
],

movement:[
{name:"前ステップ",damage:0,frame:16},
{name:"DR",damage:0,frame:8}
],

special:[

{name:"流転",damage:800,frame:10},

{
name:"疾駆け",
damage:0,
frame:18,
followups:[

{name:"急停止",button:"P",damage:0,frame:5},

{name:"胴刎ね",button:"LK",damage:900,frame:12},

{name:"影すくい",button:"MK",damage:1000,frame:14},

{name:"首狩り",button:"HK",damage:1100,frame:16},

{name:"弧空",branch:true}

]
},

{
name:"弧空",
followups:[

{name:"武神イズナ落とし",button:"P",damage:1600,frame:20},

{name:"武神鉾刃脚",button:"K",damage:1400,frame:18}

]
},

{
name:"細工手裏剣",
spray:true,
followups:[

{name:"弱手裏剣",button:"LP",damage:400,frame:10},

{name:"中手裏剣",button:"MP",damage:500,frame:10},

{name:"強手裏剣",button:"HP",damage:600,frame:10}

]
}

]

}

function drawMoves(){

let html=""

html+="<div class='category'><h2>Standing</h2>"
moves.standing.forEach(m=>{
html+=button(m)
})
html+="</div>"

html+="<div class='category'><h2>Crouching</h2>"
moves.crouching.forEach(m=>{
html+=button(m)
})
html+="</div>"

html+="<div class='category'><h2>Movement</h2>"
moves.movement.forEach(m=>{
html+=button(m)
})
html+="</div>"

html+="<div class='category'><h2>Special</h2>"
moves.special.forEach(m=>{
html+=button(m)
})
html+="</div>"

document.getElementById("moves").innerHTML=html

}

function button(m){

return `<button onclick='addMove(${JSON.stringify(m)})'>${m.name}</button>`

}

drawMoves()

function addMove(m){

combo.push(m.name)

damage+=m.damage||0
frame+=m.frame||0

if(m.spray) spray--

update()

if(m.followups) showFollow(m.followups)

}

function showFollow(list){

let html="<h3>Followups</h3>"

list.forEach(f=>{

if(f.branch){

html+=`<button onclick="branch('弧空')">弧空</button>`

}else{

html+=`<button onclick='addMove(${JSON.stringify(f)})'>${f.button} ${f.name}</button>`

}

})

document.getElementById("followups").innerHTML=html

}

function branch(name){

let m=moves.special.find(v=>v.name==name)

showFollow(m.followups)

}

function update(){

document.getElementById("combo").innerText=combo.join(" → ")
document.getElementById("damage").innerText=damage
document.getElementById("frame").innerText=frame
document.getElementById("spray").innerText=spray

}

function clearCombo(){

combo=[]
damage=0
frame=0
spray=2

update()

}

function saveCombo(){

let saved=JSON.parse(localStorage.getItem("combos")||"[]")

saved.push({combo:combo,damage:damage})

localStorage.setItem("combos",JSON.stringify(saved))

drawSaved()

}

function drawSaved(){

let saved=JSON.parse(localStorage.getItem("combos")||"[]")

let html=""

saved.forEach(s=>{
html+=`<div>${s.combo.join(" → ")} (Damage ${s.damage})</div>`
})

document.getElementById("saved").innerHTML=html

}

drawSaved()

function toggleOBS(){

document.body.classList.toggle("obs")

}

</script>

</body>
</html>
